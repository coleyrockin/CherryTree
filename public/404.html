<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page adrift - Cherry Tree</title>
  <meta name="description" content="The Cherry Tree page you were looking for has drifted out of frame." />
  <meta name="theme-color" content="#f2e2d8" />
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/bodoni-moda-latin.woff2"
    crossorigin="anonymous" />
  <style>
    /* Self-hosted fonts — same first-party WOFF2 files the main page uses.
       (The CSP blocks third-party font origins, so Google Fonts would silently
       fail here; this page must stay in-system on its own.) */
    @font-face {
      font-family: "Bodoni Moda";
      font-style: normal;
      font-weight: 400 700;
      font-display: swap;
      src: url("/assets/fonts/bodoni-moda-latin.woff2") format("woff2");
    }

    @font-face {
      font-family: "Plus Jakarta Sans";
      font-style: normal;
      font-weight: 400 600;
      font-display: swap;
      src: url("/assets/fonts/plus-jakarta-sans-latin.woff2") format("woff2");
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: clamp(24px, 6vw, 64px);
      color: #2d1e24;
      font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
      text-align: center;
      background:
        linear-gradient(180deg, rgba(248, 235, 226, 0.36), rgba(227, 197, 190, 0.76)),
        url("/assets/images/generated/prologue-fallback-1920.jpg") center / cover no-repeat,
        #f2e2d8;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        linear-gradient(90deg, rgba(248, 235, 226, 0.9), rgba(248, 235, 226, 0.24) 50%, rgba(248, 235, 226, 0.86)),
        radial-gradient(circle at 50% 44%, rgba(239, 139, 176, 0.28), transparent 44%);
      mix-blend-mode: screen;
    }

    body::after {
      inset: -50%;
      width: 200%;
      height: 200%;
      opacity: 0.24;
      background-image: radial-gradient(rgba(68, 43, 51, 0.3) 0.75px, transparent 0.85px);
      background-size: 4px 4px;
      animation: grainDrift 0.8s steps(4) infinite;
    }

    main {
      position: relative;
      z-index: 1;
      width: min(680px, 100%);
    }

    .brand {
      position: fixed;
      top: clamp(18px, 4vw, 36px);
      left: clamp(18px, 4vw, 48px);
      z-index: 2;
      font-family: "Bodoni Moda", "Times New Roman", serif;
      font-size: clamp(1.15rem, 2vw, 1.7rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(45, 30, 36, 0.86);
      text-shadow: 0 10px 28px rgba(247, 233, 224, 0.76);
    }

    .numeral {
      font-family: "Bodoni Moda", "Times New Roman", serif;
      font-size: clamp(5.5rem, 18vw, 10rem);
      font-weight: 500;
      line-height: 0.85;
      color: rgba(45, 30, 36, 0.18);
      letter-spacing: 0.02em;
    }

    .kicker {
      display: inline-block;
      margin: 1.4rem 0 1rem;
      padding-bottom: 0.7rem;
      border-bottom: 1px solid rgba(45, 30, 36, 0.22);
      color: rgba(45, 30, 36, 0.62);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.42em;
      text-transform: uppercase;
    }

    h1 {
      margin-bottom: 1.25rem;
      font-family: "Bodoni Moda", "Times New Roman", serif;
      font-size: clamp(3rem, 8vw, 5.6rem);
      font-style: italic;
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .lede {
      max-width: 38ch;
      margin: 0 auto 2.1rem;
      color: rgba(45, 30, 36, 0.72);
      font-size: clamp(0.95rem, 1.5vw, 1.08rem);
      line-height: 1.7;
    }

    .home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0.9rem 1.35rem;
      border: 1px solid rgba(49, 30, 33, 0.34);
      border-radius: 999px;
      color: rgba(45, 30, 36, 0.92);
      background: rgba(253, 246, 240, 0.54);
      backdrop-filter: blur(8px);
      font-size: 0.76rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-decoration: none;
      text-transform: uppercase;
      transition:
        transform 280ms cubic-bezier(0.22, 1, 0.36, 1),
        border-color 280ms,
        background 280ms;
    }

    .home:hover,
    .home:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(49, 30, 33, 0.56);
      background: rgba(253, 246, 240, 0.76);
      outline: none;
    }

    @keyframes grainDrift {
      0%,
      100% { transform: translate(0, 0); }
      25% { transform: translate(-2%, -3%); }
      50% { transform: translate(3%, 1%); }
      75% { transform: translate(-1%, 4%); }
    }

    @media (max-width: 520px) {
      body {
        padding-inline: 20px;
      }

      .brand {
        right: 18px;
        left: 18px;
        text-align: left;
      }

      .kicker {
        letter-spacing: 0.28em;
      }

      .home {
        width: min(100%, 300px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body::after,
      .home {
        animation: none;
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="brand" aria-hidden="true">Cherry Tree</div>
  <main>
    <div class="numeral" aria-hidden="true">404</div>
    <p class="kicker">A Page Adrift</p>
    <h1>Lost in the petals.</h1>
    <p class="lede">The page you were looking for has drifted out of frame. Return to the gallery and let the film keep moving.</p>
    <a class="home" href="/">Back to Cherry Tree</a>
  </main>
</body>
</html>
