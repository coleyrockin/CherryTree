<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="5120" viewBox="0 0 1920 2560" fill="none">
  <defs>
    <linearGradient id="forest" x1="0" y1="0" x2="0" y2="2560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8FAF84" />
      <stop offset="0.30" stop-color="#6E9464" />
      <stop offset="0.64" stop-color="#4A7244" />
      <stop offset="1" stop-color="#2E5030" />
    </linearGradient>
    <linearGradient id="light" x1="960" y1="0" x2="960" y2="1200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E8F4D8" stop-opacity="0.85" />
      <stop offset="1" stop-color="#E8F4D8" stop-opacity="0" />
    </linearGradient>
    <filter id="f60" x="0" y="0" width="1920" height="2560" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="60" />
    </filter>
    <filter id="f18" x="0" y="0" width="1920" height="2560" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18" />
    </filter>
    <filter id="f4" x="0" y="0" width="1920" height="2560" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" />
    </filter>
  </defs>

  <!-- Forest background -->
  <rect width="1920" height="2560" fill="url(#forest)" />

  <!-- Canopy light from above -->
  <rect width="1920" height="1200" fill="url(#light)" />

  <!-- Sky peek through canopy (top) -->
  <ellipse cx="960" cy="0" rx="800" ry="500" fill="#D0E8B8" opacity="0.72" filter="url(#f60)" />
  <ellipse cx="400" cy="0" rx="500" ry="360" fill="#C8E0B0" opacity="0.56" filter="url(#f60)" />
  <ellipse cx="1520" cy="0" rx="480" ry="340" fill="#CCE4B4" opacity="0.54" filter="url(#f60)" />

  <!-- Far tree trunks (background) -->
  <g fill="#2A4828" opacity="0.55">
    <rect x="140" y="400" width="44" height="2160" rx="8" />
    <rect x="380" y="280" width="52" height="2280" rx="8" />
    <rect x="680" y="360" width="38" height="2200" rx="8" />
    <rect x="1020" y="300" width="46" height="2260" rx="8" />
    <rect x="1280" y="420" width="40" height="2140" rx="8" />
    <rect x="1540" y="340" width="50" height="2220" rx="8" />
    <rect x="1780" y="380" width="36" height="2180" rx="8" />
  </g>

  <!-- Mid tree trunks -->
  <g fill="#213620" opacity="0.78">
    <rect x="60" y="600" width="62" height="1960" rx="10" />
    <rect x="490" y="500" width="68" height="2060" rx="10" />
    <rect x="860" y="540" width="56" height="2020" rx="10" />
    <rect x="1200" y="580" width="64" height="1980" rx="10" />
    <rect x="1620" y="520" width="60" height="2040" rx="10" />
    <rect x="1860" y="600" width="60" height="1960" rx="10" />
  </g>

  <!-- Foreground tree trunks (prominent) -->
  <g fill="#192E18">
    <path d="M-20 2560 C-20 2000 -10 1600 0 1200 C10 800 20 600 30 400 C40 200 50 100 60 0 L120 0 C130 100 140 200 148 400 C156 600 164 800 172 1200 C180 1600 188 2000 188 2560 Z" />
    <path d="M1730 2560 C1730 2000 1740 1600 1750 1200 C1760 800 1770 600 1778 400 C1786 200 1794 100 1800 0 L1860 0 C1868 100 1876 200 1884 400 C1892 600 1900 800 1910 1200 C1920 1600 1920 2000 1920 2560 Z" />
  </g>

  <!-- Fern / leaf shapes (midground) -->
  <g filter="url(#f4)" opacity="0.82">
    <!-- Left fern cluster -->
    <g transform="translate(280 1600)" fill="#3A6438">
      <ellipse cx="0" cy="0" rx="160" ry="50" transform="rotate(-30 0 0)" />
      <ellipse cx="0" cy="0" rx="150" ry="46" transform="rotate(-10 0 0)" />
      <ellipse cx="0" cy="0" rx="140" ry="44" transform="rotate(15 0 0)" />
      <ellipse cx="0" cy="0" rx="130" ry="42" transform="rotate(38 0 0)" />
      <ellipse cx="0" cy="0" rx="120" ry="38" transform="rotate(58 0 0)" />
    </g>
    <!-- Center fern cluster -->
    <g transform="translate(960 1800)" fill="#3E6A3C">
      <ellipse cx="0" cy="0" rx="170" ry="52" transform="rotate(-35 0 0)" />
      <ellipse cx="0" cy="0" rx="160" ry="50" transform="rotate(-12 0 0)" />
      <ellipse cx="0" cy="0" rx="150" ry="46" transform="rotate(14 0 0)" />
      <ellipse cx="0" cy="0" rx="140" ry="42" transform="rotate(40 0 0)" />
      <ellipse cx="0" cy="0" rx="128" ry="38" transform="rotate(62 0 0)" />
    </g>
    <!-- Right fern cluster -->
    <g transform="translate(1640 1680)" fill="#3A6238">
      <ellipse cx="0" cy="0" rx="155" ry="48" transform="rotate(-28 0 0)" />
      <ellipse cx="0" cy="0" rx="145" ry="46" transform="rotate(-8 0 0)" />
      <ellipse cx="0" cy="0" rx="135" ry="44" transform="rotate(18 0 0)" />
      <ellipse cx="0" cy="0" rx="125" ry="40" transform="rotate(42 0 0)" />
    </g>
  </g>

  <!-- Foreground leaves / undergrowth -->
  <g filter="url(#f4)" opacity="0.90">
    <g transform="translate(0 2200)" fill="#284E26">
      <ellipse cx="100" cy="0" rx="200" ry="60" transform="rotate(-20 100 0)" />
      <ellipse cx="240" cy="20" rx="180" ry="54" transform="rotate(5 240 20)" />
      <ellipse cx="420" cy="0" rx="210" ry="62" transform="rotate(-14 420 0)" />
    </g>
    <g transform="translate(1200 2100)" fill="#2A5028">
      <ellipse cx="100" cy="0" rx="200" ry="58" transform="rotate(-18 100 0)" />
      <ellipse cx="280" cy="20" rx="180" ry="54" transform="rotate(8 280 20)" />
      <ellipse cx="460" cy="0" rx="200" ry="60" transform="rotate(-12 460 0)" />
      <ellipse cx="620" cy="30" rx="160" ry="48" transform="rotate(20 620 30)" />
    </g>
  </g>

  <!-- Canopy leaves (top, blurred) -->
  <g filter="url(#f18)" opacity="0.82">
    <ellipse cx="300" cy="200" rx="340" ry="200" fill="#5A9050" />
    <ellipse cx="700" cy="80" rx="380" ry="220" fill="#62985A" />
    <ellipse cx="1100" cy="160" rx="360" ry="210" fill="#5C9252" />
    <ellipse cx="1500" cy="100" rx="340" ry="200" fill="#609055" />
    <ellipse cx="1800" cy="220" rx="300" ry="180" fill="#5E8E50" />
    <ellipse cx="960" cy="300" rx="420" ry="240" fill="#64965C" />
    <ellipse cx="180" cy="360" rx="300" ry="176" fill="#60925A" />
    <ellipse cx="1760" cy="380" rx="320" ry="188" fill="#5A9052" />
  </g>

  <!-- Light rays (god rays through canopy) -->
  <g opacity="0.22" fill="#D8F0C0">
    <path d="M760 0 L700 900 L820 900 Z" />
    <path d="M1000 0 L940 800 L1060 800 Z" />
    <path d="M1240 0 L1180 700 L1300 700 Z" />
    <path d="M520 0 L480 600 L560 600 Z" />
    <path d="M1460 0 L1420 650 L1500 650 Z" />
  </g>

  <!-- Floating dust / bokeh (soft spots) -->
  <g filter="url(#f18)" opacity="0.45">
    <circle cx="300" cy="700" r="28" fill="#C8ECA0" />
    <circle cx="620" cy="540" r="22" fill="#D0F0A8" />
    <circle cx="980" cy="620" r="32" fill="#CCE8A4" />
    <circle cx="1340" cy="500" r="24" fill="#C8ECA0" />
    <circle cx="1680" cy="680" r="26" fill="#D0F0A8" />
    <circle cx="160" cy="1000" r="20" fill="#C8ECA0" />
    <circle cx="800" cy="1100" r="28" fill="#CCE8A4" />
    <circle cx="1400" cy="900" r="22" fill="#D0F0A8" />
    <circle cx="1800" cy="1000" r="26" fill="#C8ECA0" />
  </g>
</svg>
